<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #eaeded;
            color: #0f1111;
            line-height: 1.5;
        }

        /* Header */
        .header {
            background: #131921;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }

        .logo span {
            color: #febd69;
        }

        .header-cart {
            display: flex;
            align-items: center;
            color: #fff;
            gap: 5px;
        }

        .cart-icon {
            font-size: 28px;
        }

        .cart-count {
            background: #f08804;
            color: #fff;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 14px;
            font-weight: bold;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Cart Section */
        .cart-section {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .cart-header h1 {
            font-size: 28px;
            font-weight: 400;
        }

        .select-all {
            color: #007185;
            cursor: pointer;
        }

        .select-all:hover {
            color: #c7511f;
            text-decoration: underline;
        }

        .price-header {
            text-align: right;
            color: #565959;
            font-size: 14px;
        }

        /* Cart Item */
        .cart-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 15px;
            padding: 20px 0;
            border-bottom: 1px solid #ddd;
        }

        .item-checkbox {
            display: flex;
            align-items: flex-start;
            padding-top: 10px;
        }

        .item-checkbox input {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #ff9900;
        }

        .item-image {
            width: 180px;
            height: 180px;
            object-fit: contain;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .item-image:hover {
            transform: scale(1.05);
        }

        .item-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item-title {
            font-size: 16px;
            color: #007185;
            cursor: pointer;
            text-decoration: none;
        }

        .item-title:hover {
            color: #c7511f;
            text-decoration: underline;
        }

        .item-stock {
            color: #007600;
            font-size: 12px;
            font-weight: 500;
        }

        .item-stock.low {
            color: #b12704;
        }

        .item-shipping {
            font-size: 12px;
            color: #565959;
        }

        .item-shipping strong {
            color: #007600;
        }

        .item-seller {
            font-size: 12px;
            color: #565959;
        }

        .item-gift {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }

        .item-gift input {
            accent-color: #ff9900;
        }

        .item-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: #f0f2f2;
        }

        .quantity-btn {
            width: 35px;
            height: 35px;
            border: none;
            background: #f0f2f2;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .quantity-btn:hover {
            background: #e3e6e6;
        }

        .quantity-btn:disabled {
            color: #ccc;
            cursor: not-allowed;
        }

        .quantity-value {
            width: 50px;
            text-align: center;
            font-weight: 500;
            background: #fff;
            border-left: 1px solid #ddd;
            border-right: 1px solid #ddd;
            padding: 8px 0;
        }

        .action-divider {
            color: #ddd;
        }

        .action-link {
            color: #007185;
            font-size: 12px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .action-link:hover {
            color: #c7511f;
            text-decoration: underline;
        }

        .item-price {
            text-align: right;
            min-width: 100px;
        }

        .price-current {
            font-size: 18px;
            font-weight: 700;
            color: #0f1111;
        }

        .price-original {
            font-size: 13px;
            color: #565959;
            text-decoration: line-through;
        }

        .price-discount {
            font-size: 13px;
            color: #cc0c39;
            font-weight: 500;
        }

        /* Size & Color */
        .item-variant {
            font-size: 12px;
            color: #565959;
        }

        .item-variant span {
            font-weight: 500;
            color: #0f1111;
        }

        /* Subtotal */
        .cart-subtotal {
            text-align: right;
            padding: 20px 0;
            font-size: 18px;
        }

        .cart-subtotal span {
            font-weight: 700;
        }

        /* Order Summary */
        .order-summary {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            height: fit-content;
            position: sticky;
            top: 80px;
        }

        .checkout-btn {
            width: 100%;
            padding: 12px;
            background: #ffd814;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
        }

        .checkout-btn:hover {
            background: #f7ca00;
        }

        .summary-subtotal {
            font-size: 18px;
            margin: 15px 0;
        }

        .summary-subtotal span {
            font-weight: 700;
        }

        .summary-items {
            color: #565959;
            font-size: 14px;
        }

        .summary-divider {
            border: none;
            border-top: 1px solid #ddd;
            margin: 15px 0;
        }

        .summary-detail {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin: 10px 0;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 700;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
        }

        .free-shipping {
            background: #f0fff4;
            border: 1px solid #067d62;
            border-radius: 8px;
            padding: 10px;
            margin-top: 15px;
            font-size: 13px;
            color: #067d62;
        }

        .free-shipping strong {
            display: block;
            margin-bottom: 3px;
        }

        /* EMI Option */
        .emi-option {
            margin-top: 15px;
            padding: 10px;
            background: #f7f8f8;
            border-radius: 8px;
            font-size: 13px;
        }

        .emi-option a {
            color: #007185;
            text-decoration: none;
        }

        .emi-option a:hover {
            text-decoration: underline;
            color: #c7511f;
        }

        /* Empty Cart */
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-cart-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .empty-cart h2 {
            font-weight: 400;
            margin-bottom: 10px;
        }

        .empty-cart p {
            color: #565959;
            margin-bottom: 20px;
        }

        .continue-shopping {
            display: inline-block;
            padding: 10px 20px;
            background: #ffd814;
            border-radius: 8px;
            text-decoration: none;
            color: #0f1111;
            font-weight: 500;
        }

        .continue-shopping:hover {
            background: #f7ca00;
        }

        /* Recommendations */
        .recommendations {
            grid-column: 1 / -1;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .recommendations h3 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .rec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .rec-item {
            text-align: center;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            transition: box-shadow 0.2s;
        }

        .rec-item:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .rec-item img {
            width: 120px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .rec-item .rec-title {
            font-size: 13px;
            color: #007185;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .rec-item .rec-price {
            font-weight: 700;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #0f1111;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #0f1111;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .cart-item {
                grid-template-columns: auto 1fr;
            }

            .item-image {
                width: 100px;
                height: 100px;
            }

            .item-price {
                grid-column: 1 / -1;
                text-align: left;
                margin-top: 10px;
            }

            .item-checkbox {
                grid-row: 1 / 3;
            }

            .cart-header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <a href="#" class="logo">Kaveri</a>
        <div class="header-cart">
            <span class="cart-icon">🛒</span>
            <span class="cart-count" id="headerCartCount">3</span>
        </div>
    </header>
    <!-- Main Container -->
    <div class="container">
        <!-- Cart Section -->
        <div class="cart-section">
            <div class="cart-header">
                <div>
                    <h1>Shopping Cart</h1>
                    <span class="select-all" onclick="selectAll()">Select all items</span>
                </div>
                <span class="price-header">Price</span>
            </div>
            <div id="cartItems">
                <!-- Cart items will be rendered here -->
            </div>
            <div class="cart-subtotal" id="cartSubtotal">
                <!-- Subtotal will be rendered here -->
            </div>
        </div>
        <!-- Order Summary -->
        <div class="order-summary">
            <button class="checkout-btn" onclick="proceedToCheckout()">
                Proceed to Checkout
            </button>

            <div class="summary-subtotal" id="summarySubtotal">
                <!-- Summary subtotal -->
            </div>
            <hr class="summary-divider">
            <div class="summary-detail">
                <span>Items (<span id="itemCount">0</span>):</span>
                <span id="itemsTotal">$0.00</span>
            </div>
            <div class="summary-detail">
                <span>Shipping:</span>
                <span id="shippingCost">FREE</span>
            </div>
            <div class="summary-detail">
                <span>Tax (estimated):</span>
                <span id="taxAmount">$0.00</span>
            </div>
            <div class="summary-total">
                <span>Order Total:</span>
                <span id="orderTotal">$0.00</span>
            </div>
            <div class="free-shipping">
                <strong>✓ Your order qualifies for FREE Shipping!</strong>
                Choose FREE Shipping at checkout.
            </div>
            <div class="emi-option">
                💳 EMI Available: <a href="#">See payment options</a>
            </div>
        </div>
        <!-- Recommendations -->
        <div class="recommendations">
            <h3>Customers who bought items in your cart also bought</h3>
            <div class="rec-grid" id="recommendations">
                <!-- Recommendations will be rendered here -->
            </div>
        </div>
    </div>
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    <script>
        // Cart Data
        let cartItems = [
            {
                id: 1,
                title: "Non Transfer waterproof Longlast Sensational Liquid and Lipsticks(Multicolor,16 ml)",
                image: "image/lipstick.jpg",
                price: 55.00,
                originalPrice: 60.00,
                discount: 5.00,
                quantity: 1,
                size: "Medium",
                color: "red",
                stock: 15,
                seller: "Fashion Hub",
                selected: true
            },
            {
                id: 2,
                title: "kurta with dupatta and bottomwear",
                image: "image/dress.jpg",
                price: 450.00,
                originalPrice: 500.00,
                discount: 10,
                quantity: 1,
                size: "M",
                color: "pink and white",
                stock: 5,
                seller: "Glamour Boutique",
                selected: true
            },
            {
                id: 3,
                title: "north zone lightweight college bag",
                image: "image/bag.jpg",
                price: 570,
                originalPrice: 500,
                discount: 30,
                quantity: 1,
                size: "meduim",
                color: "White and blue",
                stock: 23,
                seller: "Comfort Wear Co.",
                selected: true
            }
        ];
        const recommendations = [
            {
                id: 101,
                title: "blue regular fit palazzos",
                image: "image/main1 (19).jpg",
                price: 760
            },
            {
                id: 102,
                title: "sleeves solid women white top",
                image: "image/main1 (20).jpg",
                price: 194
            },
            {
                id: 103,
                title: "women's banarasi style pure kanjivaram silk",
                image: "image/main2.1.jpg",
                price: 1999.00
            },
            {
                id: 104,
                title: "new design women flared sleeves printed middy gown",
                image: "image/main1 (18).jpg",
                price: 350.00
            }
        ];
        // Render Functions
        function renderCart() {
            const container = document.getElementById('cartItems');

            if (cartItems.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <h2>Your cart is empty</h2>
                        <p>Looks like you haven't added anything to your cart yet.</p>
                        <a href="#" class="continue-shopping">Continue Shopping</a>
                    </div>
                `;
                updateSummary();
                return;
            }
            container.innerHTML = cartItems.map(item => `
                <div class="cart-item" data-id="${item.id}">
                    <div class="item-checkbox">
                        <input type="checkbox" ${item.selected ? 'checked' : ''} 
                               onchange="toggleSelect(${item.id})">
                    </div>
                    <img src="${item.image}" alt="${item.title}" class="item-image">
                    <div class="item-details">
                        <a href="#" class="item-title">${item.title}</a>
                        <span class="item-stock ${item.stock < 10 ? 'low' : ''}">
                            ${item.stock < 10 ? `Only ${item.stock} left in stock - order soon` : 'In Stock'}
                        </span>
                        <div class="item-variant">
                            Size: <span>${item.size}</span> | Color: <span>${item.color}</span>
                        </div>
                        <span class="item-shipping">
                            <strong>FREE delivery</strong> by Tomorrow, 8 PM
                        </span>
                        <span class="item-seller">Sold by: ${item.seller}</span>
                        <label class="item-gift">
                            <input type="checkbox"> This is a gift
                            <span style="color: #007185; cursor: pointer;">Learn more</span>
                        </label>
                        <div class="item-actions">
                            <div class="quantity-selector">
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)"
                                        ${item.quantity <= 1 ? 'disabled' : ''}>−</button>
                                <span class="quantity-value">${item.quantity}</span>
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)"
                                        ${item.quantity >= item.stock ? 'disabled' : ''}>+</button>
                            </div>
                            <span class="action-divider">|</span>
                            <button class="action-link" onclick="deleteItem(${item.id})">Delete</button>
                            <span class="action-divider">|</span>
                            <button class="action-link" onclick="saveForLater(${item.id})">Save for later</button>
                            <span class="action-divider">|</span>
                            <button class="action-link" onclick="shareItem(${item.id})">Share</button>
                        </div>
                    </div>
                    <div class="item-price">
                        <div class="price-current">$${(item.price * item.quantity).toFixed(2)}</div>
                        <div class="price-original">$${(item.originalPrice * item.quantity).toFixed(2)}</div>
                        <div class="price-discount">${item.discount}% off</div>
                    </div>
                </div>
            `).join('');
            updateSummary();
        }
        function renderRecommendations() {
            const container = document.getElementById('recommendations');
            container.innerHTML = recommendations.map(item => `
                <div class="rec-item" onclick="addToCart(${item.id})">
                    <img src="${item.image}" alt="${item.title}">
                    <div class="rec-title">${item.title}</div>
                    <div class="rec-price">$${item.price.toFixed(2)}</div>
                </div>
            `).join('');
        }
        // Update Summary
        function updateSummary() {
            const selectedItems = cartItems.filter(item => item.selected);
            const itemCount = selectedItems.reduce((sum, item) => sum + item.quantity, 0);
            const subtotal = selectedItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = subtotal * 0.08; // 8% tax
            const shipping = subtotal >= 35 ? 0 : 5.99;
            const total = subtotal + tax + shipping;
            // Update header cart count
            document.getElementById('headerCartCount').textContent =
                cartItems.reduce((sum, item) => sum + item.quantity, 0);
            // Update cart subtotal
            document.getElementById('cartSubtotal').innerHTML =
                `Subtotal (${itemCount} ${itemCount === 1 ? 'item' : 'items'}): <span>$${subtotal.toFixed(2)}</span>`;
            // Update order summary
            document.getElementById('summarySubtotal').innerHTML =
                `Subtotal (${itemCount} ${itemCount === 1 ? 'item' : 'items'}): <span>$${subtotal.toFixed(2)}</span>`;
            document.getElementById('itemCount').textContent = itemCount;
            document.getElementById('itemsTotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('shippingCost').textContent = shipping === 0 ? 'FREE' : `$${shipping.toFixed(2)}`;
            document.getElementById('taxAmount').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('orderTotal').textContent = `$${total.toFixed(2)}`;
        }
        // Cart Actions
        function updateQuantity(id, change) {
            const item = cartItems.find(item => item.id === id);
            if (item) {
                const newQty = item.quantity + change;
                if (newQty >= 1 && newQty <= item.stock) {
                    item.quantity = newQty;
                    renderCart();
                    showToast('Cart updated');
                }
            }
        }
        function deleteItem(id) {
            cartItems = cartItems.filter(item => item.id !== id);
            renderCart();
            showToast('Item removed from cart');
        }
        function toggleSelect(id) {
            const item = cartItems.find(item => item.id === id);
            if (item) {
                item.selected = !item.selected;
                updateSummary();
            }
        }
        function selectAll() {
            const allSelected = cartItems.every(item => item.selected);
            cartItems.forEach(item => item.selected = !allSelected);
            renderCart();
        }
        function saveForLater(id) {
            showToast('Item saved for later');
        }
        function shareItem(id) {
            const item = cartItems.find(item => item.id === id);
            if (navigator.share && item) {
                navigator.share({
                    title: item.title,
                    text: `Check out this item: ${item.title}`,
                    url: window.location.href
                });
            } else {
                showToast('Link copied to clipboard!');
            }
        }
        function addToCart(id) {
            const rec = recommendations.find(r => r.id === id);
            if (rec) {
                const newItem = {
                    id: Date.now(),
                    title: rec.title,
                    image: rec.image,
                    price: rec.price,
                    originalPrice: rec.price * 1.4,
                    discount: 28,
                    quantity: 1,
                    size: "Medium",
                    color: "Default",
                    stock: 20,
                    seller: "StyleCart",
                    selected: true
                };
                cartItems.push(newItem);
                renderCart();
                showToast('Item added to cart');
            }
        }
        function proceedToCheckout() {
            const selectedItems = cartItems.filter(item => item.selected);
            if (selectedItems.length === 0) {
                showToast('Please select items to checkout');
                return;
            }
            showToast('Redirecting to checkout...');
            // In a real app, redirect to checkout page
        }
        // Toast Notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
            renderRecommendations();
        });
    </script>
</body>

</html>
